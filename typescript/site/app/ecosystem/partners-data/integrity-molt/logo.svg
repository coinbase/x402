<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077e6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M50 5 L88 20 L88 52 C88 72 70 88 50 95 C30 88 12 72 12 52 L12 20 Z"
        fill="url(#shieldGrad)"
        stroke="#2a5298"
        stroke-width="2.5" />

  <!-- Inner shield highlight -->
  <path d="M50 13 L81 26 L81 52 C81 68 66 82 50 88 C34 82 19 68 19 52 L19 26 Z"
        fill="none"
        stroke="#2a5298"
        stroke-width="1"
        opacity="0.5" />

  <!-- Checkmark -->
  <polyline points="30,50 44,65 70,35"
            fill="none"
            stroke="url(#checkGrad)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round" />
</svg>
