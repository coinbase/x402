<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>TickersFeed logo</title>
<desc>TickersFeed multi-asset market data API - stocks, crypto, DeFi, and gas prices for AI agents</desc>
<defs>
  <linearGradient id="cryptoline" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
    <stop offset="30%" stop-color="#3b82f6" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.9"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="680" height="680" fill="#050d18"/>

<!-- Dot-grid texture -->
<g fill="#ffffff" fill-opacity="0.04">
  <circle cx="160" cy="120" r="1"/><circle cx="220" cy="120" r="1"/><circle cx="280" cy="120" r="1"/><circle cx="340" cy="120" r="1"/><circle cx="400" cy="120" r="1"/><circle cx="460" cy="120" r="1"/><circle cx="520" cy="120" r="1"/>
  <circle cx="160" cy="170" r="1"/><circle cx="220" cy="170" r="1"/><circle cx="280" cy="170" r="1"/><circle cx="340" cy="170" r="1"/><circle cx="400" cy="170" r="1"/><circle cx="460" cy="170" r="1"/><circle cx="520" cy="170" r="1"/>
  <circle cx="160" cy="220" r="1"/><circle cx="220" cy="220" r="1"/><circle cx="280" cy="220" r="1"/><circle cx="340" cy="220" r="1"/><circle cx="400" cy="220" r="1"/><circle cx="460" cy="220" r="1"/><circle cx="520" cy="220" r="1"/>
  <circle cx="160" cy="270" r="1"/><circle cx="220" cy="270" r="1"/><circle cx="280" cy="270" r="1"/><circle cx="340" cy="270" r="1"/><circle cx="400" cy="270" r="1"/><circle cx="460" cy="270" r="1"/><circle cx="520" cy="270" r="1"/>
  <circle cx="160" cy="320" r="1"/><circle cx="220" cy="320" r="1"/><circle cx="280" cy="320" r="1"/><circle cx="340" cy="320" r="1"/><circle cx="400" cy="320" r="1"/><circle cx="460" cy="320" r="1"/><circle cx="520" cy="320" r="1"/>
</g>

<!-- Price level grid lines -->
<line x1="140" y1="155" x2="540" y2="155" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" stroke-dasharray="4,10"/>
<line x1="140" y1="205" x2="540" y2="205" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" stroke-dasharray="4,10"/>
<line x1="140" y1="255" x2="540" y2="255" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" stroke-dasharray="4,10"/>
<line x1="140" y1="305" x2="540" y2="305" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" stroke-dasharray="4,10"/>

<!-- Crypto price line (blue, ascending) -->
<path d="M148,318 C170,316 185,310 210,290 C228,275 240,265 260,250 C278,237 288,232 310,215 C332,198 345,192 365,175 C385,158 400,148 420,130 C445,107 460,98 490,88 C510,82 525,80 540,78"
  fill="none" stroke="url(#cryptoline)" stroke-width="2" stroke-linecap="round"/>
<circle cx="540" cy="78" r="3.5" fill="#60a5fa"/>
<circle cx="540" cy="78" r="8" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
<text x="548" y="82" font-family="'Courier New', monospace" font-size="9" fill="#60a5fa" opacity="0.7">CRYPTO</text>

<!-- Stock candles (green) -->
<line x1="185" y1="292" x2="185" y2="345" stroke="#1f4a33" stroke-width="2"/>
<rect x="168" y="301" width="34" height="35" fill="#152b21" rx="2"/>

<line x1="243" y1="255" x2="243" y2="345" stroke="#1d6040" stroke-width="2"/>
<rect x="226" y="268" width="34" height="62" fill="#133524" rx="2"/>

<line x1="301" y1="220" x2="301" y2="344" stroke="#238049" stroke-width="2"/>
<rect x="284" y="234" width="34" height="93" fill="#174a2c" rx="2"/>

<!-- Hero candle -->
<line x1="359" y1="115" x2="359" y2="343" stroke="#3dba6e" stroke-width="2"/>
<rect x="342" y="132" width="34" height="196" fill="#00963c" rx="2"/>
<rect x="342" y="132" width="34" height="196" fill="none" stroke="#00e676" stroke-width="1.5" rx="2"/>
<circle cx="359" cy="113" r="4" fill="#00e676"/>
<circle cx="359" cy="113" r="9" fill="none" stroke="#00e676" stroke-width="1" opacity="0.35"/>
<text x="370" y="117" font-family="'Courier New', monospace" font-size="9" fill="#00e676" opacity="0.7">STOCK</text>

<!-- DeFi wave (amber, dashed) -->
<path d="M148,348 C170,340 195,330 230,325 C262,320 290,322 320,318 C350,314 375,308 400,300 C425,292 450,282 480,270 C500,262 520,258 540,252"
  fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,4" stroke-linecap="round"/>
<circle cx="540" cy="252" r="3" fill="#f59e0b" opacity="0.7"/>
<text x="548" y="256" font-family="'Courier New', monospace" font-size="9" fill="#f59e0b" opacity="0.7">DEFI</text>

<!-- Gas line (red, spiky) -->
<path d="M148,358 C160,355 170,362 185,354 C200,346 210,352 225,344 C238,337 248,343 262,335 C276,327 285,334 300,325 C312,317 325,323 340,314"
  fill="none" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>
<text x="350" y="318" font-family="'Courier New', monospace" font-size="9" fill="#ef4444" opacity="0.5">GAS</text>

<!-- Baseline -->
<line x1="148" y1="360" x2="540" y2="360" stroke="#00e676" stroke-width="1" opacity="0.25"/>

<!-- Wordmark -->
<text x="340" y="430"
  font-family="'Courier New', Courier, monospace"
  font-size="50"
  font-weight="700"
  fill="#e8f0fe"
  text-anchor="middle"
  letter-spacing="2">TICKERSFEED</text>

<!-- Divider -->
<line x1="175" y1="444" x2="505" y2="444" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.12"/>

<!-- Asset class badges -->
<rect x="136" y="458" width="80" height="22" rx="11" fill="#00e676" fill-opacity="0.1"/>
<rect x="136" y="458" width="80" height="22" rx="11" fill="none" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="176" y="474" font-family="'Courier New', monospace" font-size="10" fill="#00e676" text-anchor="middle" letter-spacing="1.5" opacity="0.9">STOCK</text>

<rect x="228" y="458" width="80" height="22" rx="11" fill="#3b82f6" fill-opacity="0.1"/>
<rect x="228" y="458" width="80" height="22" rx="11" fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="268" y="474" font-family="'Courier New', monospace" font-size="10" fill="#60a5fa" text-anchor="middle" letter-spacing="1.5" opacity="0.9">CRYPTO</text>

<rect x="320" y="458" width="80" height="22" rx="11" fill="#f59e0b" fill-opacity="0.1"/>
<rect x="320" y="458" width="80" height="22" rx="11" fill="none" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="360" y="474" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" text-anchor="middle" letter-spacing="1.5" opacity="0.9">DEFI</text>

<rect x="412" y="458" width="80" height="22" rx="11" fill="#ef4444" fill-opacity="0.1"/>
<rect x="412" y="458" width="80" height="22" rx="11" fill="none" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="452" y="474" font-family="'Courier New', monospace" font-size="10" fill="#ef4444" text-anchor="middle" letter-spacing="1.5" opacity="0.9">GAS</text>

<!-- Tagline -->
<text x="340" y="510"
  font-family="'Courier New', Courier, monospace"
  font-size="11"
  fill="#00e676"
  text-anchor="middle"
  letter-spacing="4"
  opacity="0.55">PAY · PER · CALL · MARKET DATA FOR AI AGENTS</text>

<!-- x402 badge -->
<rect x="255" y="526" width="110" height="22" rx="11" fill="#00e676" fill-opacity="0.08"/>
<rect x="255" y="526" width="110" height="22" rx="11" fill="none" stroke="#00e676" stroke-width="0.7" stroke-opacity="0.3"/>
<text x="310" y="542" font-family="'Courier New', monospace" font-size="10" fill="#00e676" text-anchor="middle" letter-spacing="2" opacity="0.7">x402 PROTOCOL</text>

<!-- Version -->
<text x="375" y="542" font-family="'Courier New', monospace" font-size="10" fill="#ffffff" text-anchor="start" opacity="0.2">v1.3.0</text>

</svg>
