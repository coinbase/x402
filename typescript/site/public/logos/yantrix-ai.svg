<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="yantrixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#yantrixGradient)" stroke="#4f46e5" stroke-width="2"/>
  
  <!-- Matrix grid pattern -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.8">
    <line x1="30" y1="30" x2="90" y2="30"/>
    <line x1="30" y1="45" x2="90" y2="45"/>
    <line x1="30" y1="60" x2="90" y2="60"/>
    <line x1="30" y1="75" x2="90" y2="75"/>
    <line x1="30" y1="90" x2="90" y2="90"/>
    
    <line x1="30" y1="30" x2="30" y2="90"/>
    <line x1="45" y1="30" x2="45" y2="90"/>
    <line x1="60" y1="30" x2="60" y2="90"/>
    <line x1="75" y1="30" x2="75" y2="90"/>
    <line x1="90" y1="30" x2="90" y2="90"/>
  </g>
  
  <!-- Central Y symbol -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="2">
    <path d="M50 35 L60 50 L70 35" stroke-linecap="round" fill="none"/>
    <line x1="60" y1="50" x2="60" y2="65" stroke-linecap="round"/>
  </g>
  
  <!-- AI indicator dots -->
  <circle cx="40" cy="40" r="2" fill="#fbbf24"/>
  <circle cx="80" cy="40" r="2" fill="#fbbf24"/>
  <circle cx="40" cy="80" r="2" fill="#fbbf24"/>
  <circle cx="80" cy="80" r="2" fill="#fbbf24"/>
</svg>