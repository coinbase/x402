packages:
  - packages/core
  - packages/extensions
  - packages/mcp
  - packages/http/*
  - packages/mechanisms/*
  - packages/legacy/*
  - examples/**/*
  - site
overrides:
  cssstyle: 5.3.6
minimumReleaseAge: 4320 # Only install package versions that have been published for at least 3 days.
minimumReleaseAgeStrict: true
allowBuilds:
  bigint-buffer: true
  bufferutil: true
  esbuild: true
  keccak: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true
